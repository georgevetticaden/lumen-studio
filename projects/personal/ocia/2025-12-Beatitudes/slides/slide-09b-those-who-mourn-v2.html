<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 9b: Those Who Mourn</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../../../library/themes/sacred-gold/theme-base.css">
    <link rel="stylesheet" href="../../../../../library/creative-dna/slides/components/header.css">
    <link rel="stylesheet" href="../../../../../library/themes/sacred-gold/header-colors.css">
    <link rel="stylesheet" href="../../../../../library/creative-dna/slides/components/typography.css">
    <link rel="stylesheet" href="../../../../../library/themes/sacred-gold/typography-colors.css">
    <link rel="stylesheet" href="../../../../../library/themes/sacred-gold/component-colors.css">
    <style>
        /* Accent color for this beatitude - Pleasure = Purple/Pink */
        :root {
            --accent-color: #9c4a7d;
            --accent-glow: rgba(156, 74, 125, 0.15);
        }

        .content {
            padding: 40px 60px;
        }

        /* Header */
        .header {
            margin-bottom: 30px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 14px;
        }

        .beatitude-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .beatitude-icon {
            font-size: 48px;
        }

        .beatitude-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 56px;
            font-weight: 300;
            color: #fff;
            letter-spacing: 1px;
        }

        /* Main content - Three columns */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 50px;
            align-items: center;
        }

        /* Left - Scripture */
        .scripture-section {
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.5s ease-out;
        }

        .scripture-section.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .scripture-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 34px;
            font-weight: 300;
            color: #fff;
            font-style: italic;
            line-height: 1.5;
        }

        .scripture-text em {
            font-style: normal;
            color: rgba(218, 165, 32, 0.95);
            font-weight: 400;
        }

        .scripture-reference {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 18px;
            letter-spacing: 0.5px;
        }

        /* Center - Freedom visual */
        .center-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease-out;
        }

        .center-visual.visible {
            opacity: 1;
            transform: scale(1);
        }

        .freedom-circle {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .freedom-circle::before {
            content: '';
            position: absolute;
            width: 290px;
            height: 290px;
            border-radius: 50%;
            border: 1px solid rgba(156, 74, 125, 0.25);
        }

        .freedom-circle::after {
            content: '';
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 1px solid rgba(156, 74, 125, 0.12);
        }

        .freedom-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
        }

        .addiction-icon {
            font-size: 52px;
            margin-bottom: 12px;
        }

        .addiction-name {
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent-color);
            text-decoration: line-through;
            text-decoration-color: rgba(180, 80, 80, 0.8);
            text-decoration-thickness: 3px;
        }

        .manifestations {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 28px;
            max-width: 300px;
        }

        .manifestation-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Right - Interpretation */
        .interpretation-section {
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.5s ease-out;
        }

        .interpretation-section.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .interpretation-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(218, 165, 32, 0.7);
            margin-bottom: 18px;
        }

        .interpretation-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
        }

        .interpretation-text em {
            font-style: normal;
            color: rgba(218, 165, 32, 0.95);
            font-weight: 400;
        }

        /* Counter badge */
        .counter-badge {
            position: absolute;
            bottom: 20px;
            left: 60px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 180px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.03);
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="counter-badge">2</div>

        <div class="content">
            <!-- Header -->
            <div class="header">
                <div class="section-label">Detachment Beatitude 2 of 4</div>
                <div class="beatitude-header">
                    <span class="beatitude-icon">💧</span>
                    <h1 class="beatitude-name">Those Who Mourn</h1>
                </div>
            </div>

            <!-- Main Content - Three Columns -->
            <div class="main-content">
                <!-- Left: Scripture -->
                <div class="scripture-section" data-build="1">
                    <p class="scripture-text">
                        "Blessed are<br>
                        <em>those who mourn</em>,<br>
                        for they shall<br>
                        be comforted."
                    </p>
                    <p class="scripture-reference">— Matthew 5:4</p>
                </div>

                <!-- Center: Freedom Visual -->
                <div class="center-visual" data-build="2">
                    <div class="freedom-circle">
                        <span class="freedom-label">Frees You From</span>
                        <span class="addiction-icon">🍷</span>
                        <span class="addiction-name">Pleasure</span>
                    </div>
                    <div class="manifestations">
                        <span class="manifestation-tag">Substances</span>
                        <span class="manifestation-tag">Numbing out</span>
                        <span class="manifestation-tag">Comfort obsession</span>
                    </div>
                </div>

                <!-- Right: Interpretation -->
                <div class="interpretation-section" data-build="3">
                    <div class="interpretation-label">What Jesus is really saying</div>
                    <p class="interpretation-text">
                        "How <em>lucky</em> you are<br>
                        if you're <em>not addicted</em><br>
                        to good feelings..."
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>const totalBuilds = 3;</script>
    <script src="../../../../../library/creative-dna/core/builds.js"></script>
</body>
</html>
