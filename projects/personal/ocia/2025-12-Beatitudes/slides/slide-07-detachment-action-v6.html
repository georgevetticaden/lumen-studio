        .content {

        /* Header - left aligned */

        /* Main content area - three columns */

            border-radius: 12px;
            text-align: center;

            letter-spacing: 4px;
            margin-bottom: 15px;

            justify-content: center;

        .column.right .column-label {
            color: rgba(218, 165, 32, 0.85);

            font-weight: 400;

        .column.right .column-title {
            color: rgba(218, 165, 32, 0.95);
        }

            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 18px;
        }

        .column.left .column-count {
            color: rgba(255, 255, 255, 0.45);
        }

        .column.right .column-count {
            color: rgba(218, 165, 32, 0.5);
        }

        .column-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 300;
            font-style: italic;
            line-height: 1.4;

        .column.left .column-tagline {
            color: rgba(255, 255, 255, 0.7);
        }

        .column.left .column-tagline em {

            color: rgba(180, 120, 120, 0.95);

        .column.right .column-tagline {

            font-style: normal;
            color: #fff;

            height: 400px;
            border-radius: 10px;

            border: 1px solid rgba(255, 255, 255, 0.08);

            transform: scale(0.95);
            transition: all 0.5s ease-out;

            opacity: 1;
            transform: scale(1);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

            right: 12px;
            color: rgba(255, 255, 255, 0.3);
