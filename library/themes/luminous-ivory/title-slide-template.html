<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Slide | OCIA</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Theme base -->
    <link rel="stylesheet" href="../../../../../library/themes/luminous-ivory/theme-base.css">
    <link rel="stylesheet" href="../../../../../library/themes/luminous-ivory/variables.css">
    <!-- Standard components -->
    <link rel="stylesheet" href="../../../../../library/creative-dna/slides/components/header.css">
    <link rel="stylesheet" href="../../../../../library/themes/luminous-ivory/header-colors.css">
    <link rel="stylesheet" href="../../../../../library/creative-dna/slides/components/typography.css">
    <link rel="stylesheet" href="../../../../../library/themes/luminous-ivory/typography-colors.css">

    <style>
        /* ── Title slide layout ── */

        .content {
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 80px;
        }

        .title {
            font-size: 72px;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 30px;
        }

        /* Gold divider line */
        .divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg,
                transparent,
                rgba(170, 120, 20, 0.9),
                transparent
            );
            margin-bottom: 30px;
        }

        .subtitle {
            font-size: 32px;
            letter-spacing: 2px;
            max-width: 800px;
            line-height: 1.4;
        }

        /* Title slides — no decorative quotes */
        .subtitle::before,
        .subtitle::after {
            content: none;
        }

        /* Presenter / Date info */
        .meta {
            position: absolute;
            bottom: 50px;
            font-size: 14px;
            color: rgba(45, 42, 38, 0.35);
            letter-spacing: 1px;
        }

        /* Optional: Two image boxes */
        .image-row {
            display: flex;
            gap: 40px;
            margin-top: 50px;
        }

        .image-box {
            width: 280px;
            height: 180px;
            background: linear-gradient(145deg, rgba(45, 42, 38, 0.06), rgba(45, 42, 38, 0.03));
            border-radius: 12px;
            border: 1px solid rgba(45, 42, 38, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-box-text {
            color: rgba(45, 42, 38, 0.35);
            font-size: 12px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="content">
            <h1 class="title">Presentation Title</h1>
            <div class="divider"></div>
            <p class="subtitle">A Journey Through Scripture and Tradition</p>

            <!-- Optional: Image boxes (uncomment if needed)
            <div class="image-row">
                <div class="image-box">
                    <div class="image-box-text">
                        <strong>IMAGE:</strong> Left image description
                    </div>
                </div>
                <div class="image-box">
                    <div class="image-box-text">
                        <strong>IMAGE:</strong> Right image description
                    </div>
                </div>
            </div>
            -->

            <div class="meta">
                OCIA &bull; St. Parish Name &bull; Month Year
            </div>
        </div>
    </div>

    <!-- No builds on title slides typically -->
</body>
</html>
