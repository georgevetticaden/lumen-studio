<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Ivory Presentation Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #C8C1B4;
        }

        .slide {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;

            /* Gradient background — warm ivory with amber glows */
            background:
                radial-gradient(ellipse at 30% 30%, rgba(218, 175, 85, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(180, 140, 60, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(218, 165, 32, 0.03) 0%, transparent 40%),
                linear-gradient(180deg, #F0EBE3 0%, #E8E1D7 100%);
        }

        /* Subtle noise texture */
        .slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.018;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="slide">
        <!-- Empty background for use in Google Slides -->
    </div>
</body>
</html>
