<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCIA Presentation Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
        }

        .slide {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;

            /* Gradient background - warm, contemplative */
            background:
                radial-gradient(ellipse at 30% 20%, rgba(45, 45, 80, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(60, 40, 30, 0.3) 0%, transparent 50%),
                linear-gradient(180deg, #0d0d12 0%, #0a0a0f 100%);
        }

        /* Subtle noise texture */
        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="slide">
        <!-- Empty background for use in Google Slides -->
    </div>
</body>
</html>
