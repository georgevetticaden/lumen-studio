<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Slide</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Theme base -->
    <link rel="stylesheet" href="../../../../../library/themes/sacred-gold/theme-base.css">
    <!-- Standard components -->
    <link rel="stylesheet" href="../../../../../library/creative-dna/slides/components/header.css">
    <link rel="stylesheet" href="../../../../../library/themes/sacred-gold/header-colors.css">
    <link rel="stylesheet" href="../../../../../library/creative-dna/slides/components/typography.css">
    <link rel="stylesheet" href="../../../../../library/themes/sacred-gold/typography-colors.css">
    <link rel="stylesheet" href="../../../../../library/themes/sacred-gold/component-colors.css">

    <style>
        /* ── Title slide layout ── */

        .content {
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 80px;
        }

        .title {
            font-size: 72px;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 30px;
        }

        /* Gold divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .divider-line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(218, 165, 32, 0.5), transparent);
        }

        .divider-diamond {
            width: 8px;
            height: 8px;
            border: 1px solid rgba(218, 165, 32, 0.5);
            transform: rotate(45deg);
        }

        .subtitle {
            font-size: 32px;
            letter-spacing: 2px;
            max-width: 800px;
            line-height: 1.4;
        }

        /* Title slides — no decorative quotes */
        .subtitle::before,
        .subtitle::after {
            content: none;
        }
    </style>
</head>
<body>
    <div class="slide">
        <!-- Optional: cross accent for religious/OCIA presentations only
        <div class="cross-accent"></div>
        -->

        <div class="content">
            <!-- Optional: top label for presentation series
            <div class="top-label">Presentation Series Name</div>
            -->

            <h1 class="title">Presentation Title</h1>

            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-diamond"></div>
                <div class="divider-line"></div>
            </div>

            <p class="subtitle">Subtitle Goes Here</p>
        </div>

        <div class="bottom-info">
            <p class="presenter-name">George Vetticaden</p>
        </div>
    </div>

    <!-- No builds on title slides typically -->
</body>
</html>
